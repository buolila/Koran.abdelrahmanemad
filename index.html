<script>
// ------------------- تسجيل الدخول وعد الزوار -------------------
const loginContainer = document.getElementById("loginContainer");
const loginBtn = document.getElementById("loginBtn");
const loginMessage = document.getElementById("loginMessage");
const mainContainer = document.getElementById("mainContainer");
const welcomeUser = document.getElementById("welcomeUser");
const visitorCountElem = document.getElementById("visitorCount");

let visitors = [];

loginBtn.addEventListener("click", () => {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if(username && password){
        visitors.push(username);

        loginContainer.style.display = "none";
        mainContainer.style.display = "block";
        welcomeUser.textContent = "مرحباً بك: " + username;
        visitorCountElem.textContent = "عدد الزوار: " + visitors.length;

        const header = document.querySelector("header");
        header.textContent = `📖 القرآن الكريم - مرحباً بك ${username}`;
    } else {
        loginMessage.textContent = "من فضلك أدخل اسم المستخدم وكلمة المرور";
    }
});

// ------------------- كود القرآن -------------------
const surahSelect = document.getElementById("surahSelect");
const reciterSelect = document.getElementById("reciterSelect");
const ayahContainer = document.getElementById("ayahContainer");
const fullSurahPlayer = document.getElementById("fullSurahPlayer");
const playMode = document.getElementById("playMode");

let currentSurahAudios = [];
let currentIndex = 0;

// تحميل السور
fetch("https://api.alquran.cloud/v1/surah")
.then(res => res.json())
.then(data => {
    data.data.forEach(surah => {
        let option = document.createElement("option");
        option.value = surah.number;
        option.textContent = surah.number + " - " + surah.name;
        surahSelect.appendChild(option);
    });
});

surahSelect.addEventListener("change", loadSurah);
reciterSelect.addEventListener("change", loadSurah);
playMode.addEventListener("change", loadSurah);

function loadSurah(){
    let surahNumber = surahSelect.value;
    let reciter = reciterSelect.value;
    if(!surahNumber) return;

    fetch(`https://api.alquran.cloud/v1/surah/${surahNumber}/${reciter}`)
    .then(res => res.json())
    .then(data => {
        ayahContainer.innerHTML = "";
        currentSurahAudios = [];

        data.data.ayahs.forEach((ayah,index)=>{
            currentSurahAudios.push(ayah.audio);
            let div = document.createElement("div");
            div.className = "ayah";
            div.innerHTML = ayah.text;

            if(playMode.value === "separate"){
                let audio = document.createElement("audio");
                audio.controls = true;
                audio.src = ayah.audio;
                div.appendChild(audio);

                if(index===0){
                    setTimeout(()=>audio.play().catch(()=>{}),500);
                }
            }
            ayahContainer.appendChild(div);
        });

        if(playMode.value==="full") playFullSurah();
        else { fullSurahPlayer.pause(); fullSurahPlayer.src=""; }
    });
}

function playFullSurah(){
    if(currentSurahAudios.length===0) return;
    currentIndex=0;
    fullSurahPlayer.src = currentSurahAudios[currentIndex];
    fullSurahPlayer.play().catch(()=>{});
    fullSurahPlayer.onended = function(){
        currentIndex++;
        if(currentIndex<currentSurahAudios.length){
            fullSurahPlayer.src=currentSurahAudios[currentIndex];
            fullSurahPlayer.play().catch(()=>{});
        }
    }
}
</script>
<script>
    function sendMail()
    {
        const name = document.getElementById("username");
        const mail = document.getElementById("usermail");
        
        emailjs.send("service_6z59c5o","template_f83tfgh",{
            name: name.value,
            email: mail.value,
        });
    }
</script>
