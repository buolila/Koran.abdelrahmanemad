<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القرآن الكريم</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Amiri', serif;
    margin:0;
    direction: rtl;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background: url('./bg.jpg') no-repeat center center fixed;
    background-size: cover;
}

#loginContainer{
    background:#fff;
    padding:30px;
    border-radius:15px;
    text-align:center;
    width:300px;
}

.container{
    display:none;
    padding:20px;
    max-width:900px;
    margin:auto;
    background:#f4f4f4;
    border-radius:12px;
}

header{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:15px;
    font-size:22px;
    border-radius:8px;
}

.ayah{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    font-size:22px;
}

audio{
    width:100%;
    margin-top:10px;
}

select{
    width:100%;
    padding:10px;
    margin-bottom:15px;
}
</style>
</head>

<body>

<div id="loginContainer">
    <h2>تسجيل الدخول</h2>
    <input type="text" id="username" placeholder="اسم المستخدم"><br><br>
    <input type="password" id="password" placeholder="كلمة المرور"><br><br>
    <button id="loginBtn">دخول</button>
    <p id="loginMessage"></p>
</div>

<div class="container" id="mainContainer">
<header>📖 القرآن الكريم</header>

<select id="reciterSelect">
<option value="ar.alafasy">مشاري العفاسي</option>
<option value="ar.husary">الحصري</option>
<option value="ar.minshawi">المنشاوي</option>
</select>

<select id="surahSelect"></select>

<div id="ayahContainer"></div>

<audio id="player" controls></audio>
</div>

<script>
const loginBtn = document.getElementById("loginBtn");
const loginContainer = document.getElementById("loginContainer");
const mainContainer = document.getElementById("mainContainer");

const surahSelect = document.getElementById("surahSelect");
const reciterSelect = document.getElementById("reciterSelect");
const ayahContainer = document.getElementById("ayahContainer");
const player = document.getElementById("player");

let audios = [];
let index = 0;

// تسجيل الدخول
loginBtn.onclick = function(){
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if(user && pass){
        loginContainer.style.display="none";
        mainContainer.style.display="block";

        // تحميل الفاتحة تلقائي
        setTimeout(()=>{
            surahSelect.value = 1;
            loadSurah();
        },300);

    }else{
        document.getElementById("loginMessage").textContent="ادخل البيانات";
    }
};

// تحميل السور
fetch("https://api.alquran.cloud/v1/surah")
.then(res=>res.json())
.then(data=>{
    data.data.forEach(s=>{
        let op=document.createElement("option");
        op.value=s.number;
        op.textContent=s.number+" - "+s.name;
        surahSelect.appendChild(op);
    });
});

// تغيير السورة أو القارئ
surahSelect.onchange = loadSurah;
reciterSelect.onchange = loadSurah;

function loadSurah(){
    let surah = surahSelect.value;
    let reciter = reciterSelect.value;

    fetch(`https://api.alquran.cloud/v1/surah/${surah}/${reciter}`)
    .then(res=>res.json())
    .then(data=>{
        ayahContainer.innerHTML="";
        audios=[];

        data.data.ayahs.forEach((a)=>{
            audios.push(a.audio);

            let div=document.createElement("div");
            div.className="ayah";
            div.textContent=a.text;
            ayahContainer.appendChild(div);
        });

        playAll();
    });
}

// تشغيل كل الآيات
function playAll(){
    if(audios.length===0) return;

    index=0;
    player.src=audios[index];

    player.play().catch(()=>{});

    player.onended=function(){
        index++;
        if(index<audios.length){
            player.src=audios[index];
            player.play();
        }
    }
}
</script>

</body>
</html>
